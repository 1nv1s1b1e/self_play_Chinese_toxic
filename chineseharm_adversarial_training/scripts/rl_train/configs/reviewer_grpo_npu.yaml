# =============================================================================
# verl GRPO 训练配置 — Reviewer (昇腾 910B 单机多卡)
# =============================================================================
# Reviewer 任务: 有害性二分类 + 毒性类别识别
# 奖励: reviewer_reward.py (binary + category + toxic_type + expression)
# =============================================================================

algorithm:
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.001

data:
  train_files: ???
  val_files: ???
  train_batch_size: 64
  max_prompt_length: 512
  max_response_length: 256
  filter_overlong_prompts: true
  truncation: error

actor_rollout_ref:
  model:
    path: ???
    enable_gradient_checkpointing: true
    use_remove_padding: false

  actor:
    strategy: fsdp
    optim:
      lr: 5.0e-7
      lr_scheduler: cosine
      warmup_steps: 10
    entropy_coeff: 0.001
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 2
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    fsdp_config:
      param_offload: false
      optimizer_offload: false

  rollout:
    name: vllm-ascend
    n: 8
    temperature: 0.8            # Reviewer 温度略低, 分类任务需要更确定性的输出
    top_p: 0.9
    log_prob_micro_batch_size_per_gpu: 4
    enable_chunked_prefill: false
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.6

  ref:
    strategy: fsdp
    log_prob_micro_batch_size_per_gpu: 4
    fsdp_config:
      param_offload: true

custom_reward_function:
  path: ???                     # reviewer_reward.py 绝对路径
  name: compute_score

trainer:
  device: npu
  n_gpus_per_node: 2
  nnodes: 1
  critic_warmup: 0
  logger: console
  project_name: chineseharm_adversarial
  experiment_name: reviewer_grpo_3B
  save_freq: 1
  test_freq: 1
  total_epochs: 3
  default_hdfs_dir: null
  default_local_dir: ???
