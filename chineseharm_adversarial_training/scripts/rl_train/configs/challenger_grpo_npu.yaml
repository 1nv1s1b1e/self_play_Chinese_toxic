# =============================================================================
# verl GRPO 训练配置 — Challenger (昇腾 910B 单机多卡)
# =============================================================================
# 用法 (以 run_grpo_challenger_npu.sh 调用为主，此 YAML 为备用配置方式):
#   python3 -m verl.trainer.main_ppo --config-path /path/to/configs \
#           --config-name challenger_grpo_npu \
#           actor_rollout_ref.model.path=/your/model \
#           data.train_files=/your/data.parquet \
#           trainer.n_gpus_per_node=2
#
# 注意:
#   - trainer.device=npu 激活昇腾 NPU 支持 (verl >= 2025/12/11 可自动识别)
#   - rollout.name=vllm-ascend 使用昇腾适配的 vllm 推理后端
#   - actor.strategy=fsdp 使用全切片数据并行 (比 megatron 更通用)
#   - flash_attn 在昇腾上不支持, 已在启动脚本中设置 VLLM_ATTENTION_BACKEND=XFORMERS
# =============================================================================

algorithm:
  adv_estimator: grpo           # GRPO: Group Relative Policy Optimization
  kl_ctrl:
    kl_coef: 0.001              # KL 散度惩罚系数

data:
  # 路径在 shell 脚本中通过命令行覆盖
  train_files: ???
  val_files: ???
  train_batch_size: 64          # 全局 batch size (跨所有 NPU)
  max_prompt_length: 512        # Prompt 最大 token 长度
  max_response_length: 256      # Response 最大 token 长度
  filter_overlong_prompts: true
  truncation: error

actor_rollout_ref:
  model:
    path: ???                   # 通过命令行传入合并后的 Challenger 模型路径
    enable_gradient_checkpointing: true
    use_remove_padding: false   # 昇腾 FSDP 场景建议关闭

  actor:
    strategy: fsdp              # FSDP: 昇腾上最稳定的并行策略
    optim:
      lr: 5.0e-7
      lr_scheduler: cosine
      warmup_steps: 10
    entropy_coeff: 0.001
    ppo_mini_batch_size: 16     # 每次 PPO 更新的 mini-batch
    ppo_micro_batch_size_per_gpu: 2  # 每卡 micro-batch (3B 模型建议 2)
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    fsdp_config:
      param_offload: false      # 显存充足时关闭, 可加速训练
      optimizer_offload: false

  rollout:
    name: vllm-ascend           # 昇腾专用 vllm 后端
    n: 8                        # GRPO group size: 每个 prompt 生成 8 个候选
    temperature: 1.0
    top_p: 0.95
    log_prob_micro_batch_size_per_gpu: 4
    enable_chunked_prefill: false   # 昇腾暂不支持 chunked prefill
    tensor_model_parallel_size: 2   # TP=2 适合 3B 模型跨 2 卡并行推理
    gpu_memory_utilization: 0.6     # vllm 显存占比 (0.6 留有余量给训练)

  ref:
    strategy: fsdp
    log_prob_micro_batch_size_per_gpu: 4
    fsdp_config:
      param_offload: true       # ref model 只做推理, 开启 offload 节省显存

custom_reward_function:
  path: ???                     # challenger_reward_v7.py 绝对路径
  name: compute_score

trainer:
  device: npu                   # 昇腾 NPU 设备
  n_gpus_per_node: 2            # 单机 NPU 卡数 (910B 双卡)
  nnodes: 1                     # 单机训练
  critic_warmup: 0              # GRPO 无需 critic warmup
  logger: console
  project_name: chineseharm_adversarial
  experiment_name: challenger_grpo_3B
  save_freq: 1                  # 每 epoch 保存 checkpoint
  test_freq: 1                  # 每 epoch 评估
  total_epochs: 3
  default_hdfs_dir: null
  default_local_dir: ???        # 输出目录通过命令行传入
